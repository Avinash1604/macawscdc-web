<section class="testimonials-carousel-section">
  <div class="container">
    <div class="text-center mb-5">
      <div class="section-badge">Client Testimonials</div>
      <h2 class="section-title">What <span class="text-primary"> Parents Say</span> About Us</h2>
    </div>

    <div class="carousel-wrapper" (mouseenter)="onMouseEnter()" (mouseleave)="onMouseLeave()">
      <div class="testimonial-container" #carousel>
        <div class="testimonial-card" *ngFor="let t of testimonials; let i = index" [class.active]="currentIndex === i">
          <div class="card-inner">
            <div class="quote-icon">“</div>
            <div class="testi-stars mb-3">
              <i class="bi bi-star-fill" *ngFor="let star of [1,2,3,4,5]"></i>
            </div>
            <p class="testi-quote">{{ t.quote }}</p>
            <div class="testi-profile">
              <div class="testi-avatar">
                <img [src]="t.avatar" [alt]="t.name" (error)="onImgError($event, t.name)">
              </div>
              <div class="testi-info">
                <h5 class="testi-name">{{ t.name }}</h5>
                <span class="testi-city">{{ t.city }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Navigation Arrows -->
      <button class="nav-btn prev" (click)="prev()"><i class="bi bi-chevron-left"></i></button>
      <button class="nav-btn next" (click)="next()"><i class="bi bi-chevron-right"></i></button>
    </div>

    <!-- Enhanced Pagination Dots -->
    <div class="pagination-dots mt-5">
      <div 
        *ngFor="let t of testimonials; let i = index" 
        class="dot" 
        [class.active]="currentIndex === i"
        (click)="goTo(i)">
      </div>
    </div>
  </div>
</section>
