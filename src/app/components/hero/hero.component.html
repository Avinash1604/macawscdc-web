<section class="py-5 position-relative" style="background: linear-gradient(rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.8)), url('https://kitnew.moxcreative.com/kindera/wp-content/uploads/sites/35/2023/01/bg_img.png') center/cover; border-radius: 0 0 150px 0;">
  <div class="container">
    <div class="row align-items-center gap-4 gap-md-0">
      <!-- Left Content -->
      <div class="col-lg-6">
        <h4 class="text-muted mb-3 fade-in-up delay-100">Welcome to MacawsCDC</h4>
        <h1 class="display-4 fw-bold mb-4 fade-in-up delay-200">Helping Your Child Thrive, Grow, and Shine</h1>
        <p class="lead mb-4 text-muted fade-in-up delay-300">Expert-led child development therapies designed to support speech, behavior, learning, and emotional well-being—personalized for every child.</p>
        
        <!-- Buttons -->
        <div class="d-flex gap-3 flex-wrap fade-in-up delay-400">
          <!-- <a href="#" class="btn btn-primary btn-lg rounded-pill px-5">Discover more</a> -->
          <button type="button" class="btn btn-outline-secondary btn-lg rounded-pill px-5" (click)="openVideo()">
            <i class="bi bi-play-fill me-2"></i>Play Intro
          </button>
        </div>
      </div>
      
      <!-- Right Image -->
      <div class="col-lg-6">
        <img src="assets/img/KidBalancing.png" alt="Boy on therapy swing" class="img-fluid rounded slide-in-right delay-250" style="border-radius: 0 200px 0 200px;">
      </div>
    </div>
  </div>
</section>
<!-- Video modal -->
<div class="video-modal" *ngIf="showVideo">
  <div class="video-overlay" (click)="closeVideo()"></div>
  <div class="video-wrapper">
    <button class="video-close" (click)="closeVideo()" aria-label="Close video">×</button>
    <div class="video-inner">
      <iframe *ngIf="sanitizedVideoSrc" [src]="sanitizedVideoSrc" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
  </div>
</div>
<!-- text-primary -->
